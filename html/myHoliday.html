<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 휴일 일과</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container holiday-container">
        
        <h1 class="header-title">🏖️ 나의 휴일 일과 🏖️</h1>
        
        <p style="text-align: center; color: #4e5968; margin-top: -15px; margin-bottom: 30px; font-size: 15px; line-height: 1.6;">
            26/07/18 (토)를 기준으로 작성된 일과입니다.<br>
            꼭 해야만 하는 일은 하이라이트 표시를 했습니다.<br>
            체크박스를 활용해 진행도를 한 눈에 확인해보세요!
        </p>
        
        <section class="routine-card">
            <h2>&#x1F6CF; 여유로운 아침</h2>
            <ul class="schedule-list">
                <li><input type="checkbox" id="m1"><label for="m1"><span>&#x1F6BF; <b>10:00</b> - 기상 및 세면</span></label></li>
                <li><input type="checkbox" id="m2"><label for="m2"><span>&#x1F96F; <b>11:00</b> - 아점</span></label></li>
                <li><input type="checkbox" id="m3"><label for="m3"><span>&#x1F9F3; <b>12:00</b> - 외출 준비</span></label></li>
            </ul>
        </section>

        <section class="routine-card">
            <h2>☀️ 오후</h2>
            <ul class="schedule-list">
                <li><input type="checkbox" id="a1"><label for="a1"><span>🥤 <b>13:00</b> - <mark>카페 방문</mark></span></label></li>
                <li><input type="checkbox" id="a2"><label for="a2"><span>🧑🏻‍💻 <b>13:30</b> - <mark>HTML, CSS 및 Javascript 복습</mark></span></label></li>
                <li><input type="checkbox" id="a3"><label for="a3"><span>🚶 <b>17:00</b> - 산책</span></label></li>
            </ul>
        </section>

        <section class="routine-card">
            <h2>🌃 저녁</h2>
            <ul class="schedule-list">
                <li><input type="checkbox" id="e1"><label for="e1"><span>🍽️ <b>18:00</b> - 저녁 식사</span></label></li>
                <li><input type="checkbox" id="e2"><label for="e2"><span>▶️ <b>19:00</b> - Youtube 시청</span></label></li>
                <li><input type="checkbox" id="e3"><label for="e3"><span>🧺 <b>21:00</b> - <mark>빨래</mark></span></label></li>
                <li><input type="checkbox" id="e4"><label for="e4"><span>💤 <b>23:00</b> - 취침</span></label></li>
            </ul>
        </section>
        
    </div>
</body>
    <div class="button-wrapper">
        <a href="index.html" class="back-btn">⬅️ 메인으로 돌아가기</a>
    </div>
</html>
